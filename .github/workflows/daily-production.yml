name: Daily LA Temperature Forecast

on:
  schedule:
    # Runs every morning at 6:35 AM Los Angeles time.
    # GitHub Actions supports IANA timezones on scheduled workflows.
    - cron: "35 6 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      retrain:
        description: "Force Part 2 model retraining"
        required: false
        default: false
        type: boolean
      model:
        description: "Part 2 model backbone"
        required: false
        default: "lstm"
        type: choice
        options:
          - lstm
          - transformer

permissions:
  contents: write

concurrency:
  group: latemp-production
  cancel-in-progress: false

env:
  LATEMP_ROOT: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  forecast:
    name: Run daily forecast pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -vE '^torch([<>=! ].*)?$' requirements.txt > /tmp/requirements-no-torch.txt
          pip install -r /tmp/requirements-no-torch.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Restore accumulated artifacts from remote
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --quiet || true

          for path in \
            artifacts_part2/prediction_log.csv \
            artifacts_part2/part2_meta.json \
            artifacts_part2/lstm_model.pt \
            artifacts_part2/transformer_model.pt \
            artifacts_part2/feature_scaler.pkl \
            artifacts_part2/target_scaler.pkl \
            artifacts_part3/governance_history.parquet \
            artifacts_part9/live_attribution_report.json \
            artifacts_part9/attribution_tape.parquet \
            artifacts_part9/skill_history.parquet
          do
            git checkout "origin/${GITHUB_REF_NAME}" -- "$path" 2>/dev/null || true
          done

      - name: Decide run arguments
        id: args
        run: |
          MODEL="${{ github.event.inputs.model || 'lstm' }}"
          RETRAIN="${{ github.event.inputs.retrain || 'false' }}"

          ARGS="--model ${MODEL}"
          if [ "$RETRAIN" = "true" ]; then
            ARGS="$ARGS --retrain"
          fi

          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"
          echo "Run arguments: ${ARGS}"

      - name: Run full daily pipeline
        run: |
          python run_daily_forecast.py ${{ steps.args.outputs.args }}

      - name: Verify required artifacts
        id: verify
        if: always()
        run: |
          missing=0
          for path in \
            artifacts_part0/data_meta.json \
            artifacts_part0/historical_daily.parquet \
            artifacts_part1/feature_matrix.parquet \
            artifacts_part1/train_val_test_split.json \
            artifacts_part2/prediction_log.csv \
            artifacts_part2/part2_meta.json \
            artifacts_part2/feature_scaler.pkl \
            artifacts_part2/target_scaler.pkl \
            artifacts_part2a/alpha_meta.json \
            artifacts_part2a/alpha_features.parquet \
            artifacts_part3/governance_report.json \
            artifacts_part3/governance_history.parquet \
            artifacts_part6/regime_meta.json \
            artifacts_part6/regime_tape.parquet \
            artifacts_part9/live_attribution_report.json
          do
            if [ -f "$path" ]; then
              echo "OK: $path"
            else
              echo "MISSING: $path"
              missing=$((missing + 1))
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Fail if required artifacts are missing
        if: steps.verify.outputs.missing != '0'
        run: |
          echo "Required artifacts are missing. Aborting artifact commit."
          exit 1

      - name: Commit and push forecast artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f \
            artifacts_part0/ \
            artifacts_part1/ \
            artifacts_part2/ \
            artifacts_part2a/ \
            artifacts_part3/ \
            artifacts_part6/ \
            artifacts_part9/ || true

          git add -f artifacts_part2b/ 2>/dev/null || true
          git add -f artifacts_part2c/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "Update LA temperature forecast artifacts"

          git pull origin "${GITHUB_REF_NAME}" \
            --no-rebase \
            --strategy-option=ours \
            --no-edit || true

          git push origin HEAD:"${GITHUB_REF_NAME}"
