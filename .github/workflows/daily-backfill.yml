name: Daily Realized Temperature Backfill

on:
  schedule:
    # Runs at 7:10 AM Los Angeles time to backfill realized highs that have matured.
    - cron: "10 7 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latemp-production
  cancel-in-progress: false

env:
  LATEMP_ROOT: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    name: Run Part 9 attribution backfill
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore accumulated artifacts from remote
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --quiet || true

          for path in \
            artifacts_part0/historical_daily.parquet \
            artifacts_part0/nws_official_forecast.json \
            artifacts_part2/prediction_log.csv \
            artifacts_part3/prediction_log.csv \
            artifacts_part9/live_attribution_report.json \
            artifacts_part9/attribution_tape.parquet \
            artifacts_part9/skill_history.parquet
          do
            git checkout "origin/${GITHUB_REF_NAME}" -- "$path" 2>/dev/null || true
          done

      - name: Run realized-temperature attribution
        run: python part9_live_attribution.py

      - name: Commit and push backfill artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f \
            artifacts_part2/prediction_log.csv \
            artifacts_part9/live_attribution_report.json \
            artifacts_part9/attribution_tape.parquet \
            artifacts_part9/skill_history.parquet || true

          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi

          git commit -m "Backfill realized LA temperatures"

          git pull origin "${GITHUB_REF_NAME}" \
            --no-rebase \
            --strategy-option=ours \
            --no-edit || true

          git push origin HEAD:"${GITHUB_REF_NAME}"
