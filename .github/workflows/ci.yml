name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "artifacts_part*/**"
      - "*.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "artifacts_part*/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latemp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Python syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile project scripts
        run: |
          python -m py_compile \
            part0_data_infrastructure.py \
            part1_feature_builder.py \
            part2_deep_learning_forecaster.py \
            part2a_atmospheric_alpha.py \
            part2b_xgb_ensemble.py \
            part2c_bnn_sleeve.py \
            part3_forecast_governance.py \
            part6_weather_regime_engine.py \
            part9_live_attribution.py \
            run_daily_forecast.py

      - name: Check command-line interfaces
        run: |
          python run_daily_forecast.py --help
          python part2_deep_learning_forecaster.py --help

          
