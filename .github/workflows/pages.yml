name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site/data

          if [ -f index.html ]; then
            cp index.html _site/index.html
          else
            python - <<'PYEOF'
            import html
            import json
            from pathlib import Path

            def load_json(path):
                p = Path(path)
                if not p.exists():
                    return None
                try:
                    return json.loads(p.read_text())
                except Exception:
                    return None

            gov = load_json("artifacts_part3/governance_report.json") or {}
            attr = load_json("artifacts_part9/live_attribution_report.json") or {}
            meta = load_json("artifacts_part2/part2_meta.json") or {}

            publish_mode = gov.get("publish_mode", "UNKNOWN")
            decision_date = gov.get("decision_date", "UNKNOWN")
            generated_at = attr.get("generated_at", gov.get("run_at", "UNKNOWN"))
            model_type = meta.get("model_type", "UNKNOWN")

            metrics = attr.get("metrics_by_horizon", {}) or {}
            rows = []
            for key in ["h1", "h3", "h5"]:
                m = metrics.get(key, {}) or {}
                rows.append(
                    "<tr>"
                    f"<td>{html.escape(key.upper())}</td>"
                    f"<td>{html.escape(str(m.get('n_samples', '—')))}</td>"
                    f"<td>{html.escape(str(m.get('mae_f', '—')))}</td>"
                    f"<td>{html.escape(str(m.get('rmse_f', '—')))}</td>"
                    f"<td>{html.escape(str(m.get('bias_f', '—')))}</td>"
                    f"<td>{html.escape(str(m.get('skill_vs_persistence', '—')))}</td>"
                    "</tr>"
                )

            page = f"""<!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>LA Temperature Forecast</title>
              <style>
                :root {{ color-scheme: dark; }}
                body {{ margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #020817; color: #e5e7eb; }}
                main {{ max-width: 980px; margin: 0 auto; padding: 40px 20px; }}
                .card {{ background: #0f172a; border: 1px solid #1e293b; border-radius: 18px; padding: 24px; margin: 18px 0; box-shadow: 0 20px 60px rgba(0,0,0,.25); }}
                h1 {{ font-size: 2.2rem; margin: 0 0 8px; }}
                h2 {{ margin-top: 0; }}
                .muted {{ color: #94a3b8; }}
                .grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }}
                .stat {{ background: #111827; border: 1px solid #273449; border-radius: 14px; padding: 16px; }}
                .label {{ color: #94a3b8; font-size: .85rem; }}
                .value {{ font-size: 1.25rem; margin-top: 4px; font-weight: 700; }}
                table {{ width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }}
                th, td {{ padding: 12px; border-bottom: 1px solid #273449; text-align: left; }}
                th {{ color: #cbd5e1; background: #111827; }}
                a {{ color: #93c5fd; }}
              </style>
            </head>
            <body>
              <main>
                <p class="muted">Production forecast dashboard</p>
                <h1>LA Temperature Forecast</h1>
                <div class="card grid">
                  <div class="stat"><div class="label">Decision date</div><div class="value">{html.escape(str(decision_date))}</div></div>
                  <div class="stat"><div class="label">Publish mode</div><div class="value">{html.escape(str(publish_mode))}</div></div>
                  <div class="stat"><div class="label">Model</div><div class="value">{html.escape(str(model_type))}</div></div>
                  <div class="stat"><div class="label">Generated at</div><div class="value">{html.escape(str(generated_at))}</div></div>
                </div>
                <div class="card">
                  <h2>Live Attribution</h2>
                  <table>
                    <thead><tr><th>Horizon</th><th>n</th><th>MAE °F</th><th>RMSE °F</th><th>Bias °F</th><th>Skill vs persistence</th></tr></thead>
                    <tbody>{''.join(rows)}</tbody>
                  </table>
                </div>
                <div class="card">
                  <h2>Artifacts</h2>
                  <p class="muted">This site is generated from committed workflow artifacts. If values show UNKNOWN or —, run the daily pipeline first.</p>
                </div>
              </main>
            </body>
            </html>"""
            Path("_site/index.html").write_text(page)
            PYEOF
          fi

          for path in \
            artifacts_part2/prediction_log.csv \
            artifacts_part2/part2_meta.json \
            artifacts_part3/governance_report.json \
            artifacts_part9/live_attribution_report.json
          do
            if [ -f "$path" ]; then
              cp "$path" _site/data/
            fi
          done

          if [ -d assets ]; then
            cp -r assets _site/assets
          fi

          if [ -f favicon.ico ]; then
            cp favicon.ico _site/favicon.ico
          fi

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy static site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
